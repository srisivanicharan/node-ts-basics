name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run Snyk security scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high --json > /tmp/snyk-dep.json 2>&1 || DEP_FAILED=1
          snyk code test --json > /tmp/snyk-code.json 2>&1 || CODE_FAILED=1

          {
            echo "## 🔒 Snyk Security Report"
            echo ""

            echo "### 📦 Dependency Vulnerabilities"
            echo ""
            if [ -z "$DEP_FAILED" ]; then
              echo "✅ No high or critical dependency vulnerabilities found."
            else
              echo "| Severity | Package | Version | Vulnerability | Fix Available |"
              echo "|----------|---------|---------|---------------|---------------|"
              jq -r '
                .vulnerabilities // [] |
                sort_by(.severity) | reverse |
                .[] |
                (if .severity == "critical" then "🔴 Critical"
                 elif .severity == "high" then "🟠 High"
                 elif .severity == "medium" then "🟡 Medium"
                 else "🔵 Low" end) as $sev |
                (.fixedIn // [] | if length > 0 then "✅ " + .[0] else "❌ None" end) as $fix |
                "| \($sev) | \(.packageName) | \(.version) | \(.title) | \($fix) |"
              ' /tmp/snyk-dep.json 2>/dev/null || echo "| — | Could not parse dependency results | | | |"
            fi

            echo ""
            echo "### 🧑‍💻 Code Vulnerabilities"
            echo ""
            if [ -z "$CODE_FAILED" ]; then
              echo "✅ No code vulnerabilities found."
            else
              echo "| Severity | File | Line | Issue |"
              echo "|----------|------|------|-------|"
              jq -r '
                .runs[0].results // [] |
                .[] |
                (.level // "warning") as $level |
                (if $level == "error" then "🔴 High"
                 elif $level == "warning" then "🟡 Medium"
                 else "🔵 Low" end) as $sev |
                .message.text as $msg |
                .locations[0].physicalLocation.artifactLocation.uri as $file |
                (.locations[0].physicalLocation.region.startLine | tostring) as $line |
                "| \($sev) | \($file) | \($line) | \($msg) |"
              ' /tmp/snyk-code.json 2>/dev/null || echo "| — | Could not parse code results | | |"
            fi

          } | tee /tmp/snyk-report.md >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/snyk-report.md
          fi

          [ -z "$DEP_FAILED" ] && [ -z "$CODE_FAILED" ] || exit 1

      - name: Run ESLint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(npx eslint src/**/*.ts 2>&1) || ESLINT_EXIT=$?

          if [ -z "$ESLINT_EXIT" ]; then
            STATUS="✅ No ESLint issues found."
          else
            STATUS=$(printf '❌ ESLint issues found:\n```\n%s\n```' "$OUTPUT")
          fi

          {
            echo "## ESLint Report"
            echo ""
            echo "**Files checked:**"
            find src -name "*.ts" | while read f; do echo "- \`$f\`"; done
            echo ""
            echo "$STATUS"
          } | tee /tmp/eslint-report.md >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/eslint-report.md
          fi

          exit ${ESLINT_EXIT:-0}

      - name: Run tests
        run: |
          mkdir -p tap-output
          for file in $(find src/tests -name "*.test.ts" | sort); do
            name=$(basename "$file" .ts)
            npx tsx "$file" > "tap-output/${name}.txt" || echo "TEST_FAILED=1" >> $GITHUB_ENV
          done

      - name: Convert TAP to JUnit
        if: always()
        run: |
          mkdir -p test-results
          for tapfile in tap-output/*.txt; do
            name=$(basename "$tapfile" .txt)
            npx tap-junit --input "$tapfile" --output "test-results/${name}" --name "$name" || true
          done

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: test-results/**/*.xml
          fail_on_failure: true

      - name: Post test results as PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL_PASS=0
          TOTAL_FAIL=0
          FILE_SECTIONS=""

          for tapfile in $(ls tap-output/*.txt | sort); do
            filename=$(basename "$tapfile" .txt)

            PASS_ROWS=""
            FAIL_ROWS=""
            PASS_COUNT=0
            FAIL_COUNT=0
            current_test=""
            current_status="pass"

            while IFS= read -r line; do
              if [[ "$line" == "# "* ]]; then
                test_name="${line:2}"
                if [[ "$test_name" =~ ^(tests|pass|fail)[[:space:]][0-9]+$ ]]; then
                  continue
                fi
                if [ -n "$current_test" ]; then
                  if [ "$current_status" = "pass" ]; then
                    PASS_COUNT=$((PASS_COUNT + 1))
                    PASS_ROWS+="| ✅ | $current_test |\n"
                  else
                    FAIL_COUNT=$((FAIL_COUNT + 1))
                    FAIL_ROWS+="| ❌ | $current_test |\n"
                  fi
                fi
                current_test="$test_name"
                current_status="pass"
              elif [[ "$line" == "not ok "* ]]; then
                current_status="fail"
              fi
            done < "$tapfile"

            if [ -n "$current_test" ]; then
              if [ "$current_status" = "pass" ]; then
                PASS_COUNT=$((PASS_COUNT + 1))
                PASS_ROWS+="| ✅ | $current_test |\n"
              else
                FAIL_COUNT=$((FAIL_COUNT + 1))
                FAIL_ROWS+="| ❌ | $current_test |\n"
              fi
            fi

            TOTAL_PASS=$((TOTAL_PASS + PASS_COUNT))
            TOTAL_FAIL=$((TOTAL_FAIL + FAIL_COUNT))
            FILE_TOTAL=$((PASS_COUNT + FAIL_COUNT))

            if [ "$FAIL_COUNT" -gt 0 ]; then
              ICON="❌"
              OPEN="open"
            else
              ICON="✅"
              OPEN=""
            fi

            FILE_SECTIONS+="<details $OPEN>\n"
            FILE_SECTIONS+="<summary>$ICON $filename.ts — $FILE_TOTAL tests, $PASS_COUNT passed, $FAIL_COUNT failed</summary>\n\n"
            FILE_SECTIONS+="| Status | Test |\n"
            FILE_SECTIONS+="|--------|------|\n"
            FILE_SECTIONS+="${FAIL_ROWS}${PASS_ROWS}"
            FILE_SECTIONS+="\n</details>\n\n"
          done

          TOTAL=$((TOTAL_PASS + TOTAL_FAIL))

          if [ "$TOTAL_FAIL" -eq 0 ]; then
            RESULT="✅ All tests passed"
          else
            RESULT="❌ Some tests failed"
          fi

          {
            echo "## 🧪 Test Report"
            echo ""
            echo "$RESULT"
            echo ""
            echo "| Total | ✅ Passed | ❌ Failed |"
            echo "|-------|-----------|-----------|"
            echo "| $TOTAL | $TOTAL_PASS | $TOTAL_FAIL |"
            echo ""
            echo "---"
            echo ""
            printf "$FILE_SECTIONS"
          } > /tmp/test-report.md

          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/test-report.md

      - name: Fail if tests failed
        if: env.TEST_FAILED == '1'
        run: exit 1

      - name: Run coverage
        if: always()
        run: |
          TEST_CMD=""
          for file in $(find src/tests -name "*.test.ts" | sort); do
            if [ -z "$TEST_CMD" ]; then
              TEST_CMD="npx tsx $file"
            else
              TEST_CMD="$TEST_CMD && npx tsx $file"
            fi
          done
          npx c8 --reporter=json-summary bash -c "$TEST_CMD" > /dev/null 2>&1 || true
          cat coverage/coverage-summary.json || echo "coverage-summary.json not found"

      - name: Post coverage as PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## 📊 Coverage Report"
            echo ""
            echo "| File | Statements | Branches | Functions | Lines |"
            echo "|------|-----------|----------|-----------|-------|"

            jq -r '
              ( [to_entries[] | select(.key == "total")] +
                [to_entries[] | select(.key != "total")] ) |
              .[] |
              (.key | if . == "total" then "**All files**" else split("/") | last end) as $name |
              (.value.statements.pct | tostring) as $s |
              (.value.branches.pct | tostring) as $b |
              (.value.functions.pct | tostring) as $f |
              (.value.lines.pct | tostring) as $l |
              (if (.value.statements.pct >= 100 and .value.branches.pct >= 100 and .value.functions.pct >= 100 and .value.lines.pct >= 100) then "✅" else "⚠️" end) as $icon |
              "| \($icon) \($name) | \($s)% | \($b)% | \($f)% | \($l)% |"
            ' coverage/coverage-summary.json
          } > /tmp/coverage-report.md

          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/coverage-report.md
