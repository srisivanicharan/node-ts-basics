name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(npx eslint src/**/*.ts 2>&1) || ESLINT_EXIT=$?

          if [ -z "$ESLINT_EXIT" ]; then
            STATUS="✅ No ESLint issues found."
          else
            STATUS=$(printf '❌ ESLint issues found:\n```\n%s\n```' "$OUTPUT")
          fi

          {
            echo "## ESLint Report"
            echo ""
            echo "**Files checked:**"
            find src -name "*.ts" | while read f; do echo "- \`$f\`"; done
            echo ""
            echo "$STATUS"
          } | tee /tmp/eslint-report.md >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/eslint-report.md
          fi

          exit ${ESLINT_EXIT:-0}

      - name: Run tests
        run: npx tsx src/tests/userService.test.ts | npx tap-junit --name "User Service Tests" > test-results.xml; exit ${PIPESTATUS[0]}

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit
