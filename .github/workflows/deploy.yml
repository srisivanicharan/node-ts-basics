name: Deploy Latest Image to Azure

on:
  schedule:
    - cron: '0 0 * * *'  # runs every day at midnight UTC
  workflow_dispatch:       # allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete existing container
        run: |
          az container delete \
            --resource-group node-ts-basics-rg \
            --name node-ts-basics \
            --yes || true

      - name: Deploy latest image
        run: |
          az container create \
            --resource-group node-ts-basics-rg \
            --name node-ts-basics \
            --image ghcr.io/${{ github.repository_owner }}/node-ts-basics:latest \
            --ports 3000 \
            --dns-name-label node-ts-basics \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5

      - name: Show deployed URL
        run: |
          echo "App deployed at: http://node-ts-basics.eastus.azurecontainer.io:3000"
